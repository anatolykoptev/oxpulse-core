# Automated releases via release-please.
#
# Flow (no manual version/tag steps):
#   1. Land conventional commits on `main` (feat:/fix:/perf:/docs:/... — breaking
#      via `!` or a `BREAKING CHANGE:` footer).
#   2. release-please opens/updates a per-package "chore(main): release <component>
#      X.Y.Z" PR that bumps that package's package.json + prepends its CHANGELOG.md
#      from those commits.
#   3. Merging a release PR creates the `<component>-vX.Y.Z` tag + GitHub Release.
#
# Two independently-versioned packages (packages/identity, packages/mesh-core) →
# separate-pull-requests:true so each gets its own release PR; component tags
# (include-component-in-tag:true) keep identity-vX.Y.Z / mesh-core-vX.Y.Z distinct
# instead of colliding on a single vX.Y.Z per the sfu-kit single-package pattern.
#
# Versioning: 0.x pre-1.0 (bump-minor-pre-major + bump-patch-for-minor-pre-major) —
# feat/fix bump PATCH, a breaking change bumps MINOR. Do NOT `git tag` by hand:
# a manual tag desyncs .release-please-manifest.json.
#
# NO publish job: both packages are private:true, consumed as workspace/engine
# dependencies by oxpulse-chat (not published to npm). This workflow only
# manages version + changelog + git tag + release PR — actual consumption stays
# a source/engine dependency, unchanged by this setup.
#
# Runner: self-hosted per fleet CI rule (GitHub-hosted Actions are paid, never
# used fleet-wide) — runs on the krolik self-hosted runner once one is
# registered for this repo. NONE is registered yet as of this workflow's
# creation (0 runners on the repo at setup time) — flagged in the
# release-please-setup audit report; the job will queue until a runner is
# added (`~/actions-runner-oxpulse-core`, mirroring the other fleet repos).

name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: [self-hosted, krolik]
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
