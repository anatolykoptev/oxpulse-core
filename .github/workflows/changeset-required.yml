name: Changeset required

on:
  pull_request:
    branches:
      - main

jobs:
  changeset-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changeset
        if: |
          !contains(github.event.pull_request.labels.*.name, 'skip-changeset') &&
          !contains(github.event.pull_request.title, '[no-changeset]')
        run: pnpm changeset status --since=origin/${{ github.base_ref }} --output=/tmp/changeset-status.json && cat /tmp/changeset-status.json
